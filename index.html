
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GamerVoice App - نظام الروم والمكالمات العائمة</title>
    <style>
        /* الألوان والهوية البصرية للجيمينج */
        :root {
            --bg-color: #0b0c10;
            --card-bg: #141722;
            --accent-purple: #8a2be2;
            --accent-cyan: #00ffff;
            --accent-green: #39ff14;
            --text-color: #ffffff;
            --text-muted: #8589a3;
            --danger: #ff0055;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: radial-gradient(circle at center, #1b163d 0%, #0b0c10 100%);
            overflow-x: hidden;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .card {
            background: var(--card-bg);
            border: 2px solid rgba(138, 43, 226, 0.2);
            border-radius: 24px;
            padding: 35px 25px;
            text-align: center;
            box-shadow: 0 0 40px rgba(138, 43, 226, 0.2);
            backdrop-filter: blur(12px);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* التحكم في عرض الشاشات */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            text-shadow: 0 0 15px var(--accent-purple);
            color: #fff;
        }

        .subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 30px;
        }

        /* واجهة رفع الصورة */
        .avatar-uploader {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 30px;
            cursor: pointer;
        }

        .avatar-ring {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            border: 3px solid var(--accent-cyan);
            background: #1d2133;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            transition: all 0.3s ease;
        }

        .avatar-uploader:hover .avatar-ring {
            border-color: var(--accent-purple);
            box-shadow: 0 0 25px rgba(138, 43, 226, 0.5);
            transform: scale(1.03);
        }

        .avatar-ring img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }

        .avatar-ring .icon-placeholder {
            font-size: 3.5rem;
            color: var(--text-muted);
        }

        .upload-badge {
            position: absolute;
            bottom: 5px;
            right: 5px;
            background: var(--accent-purple);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid var(--card-bg);
            color: white;
            font-size: 1.1rem;
        }

        /* الأزرار الاحترافية للجيمنج */
        .btn {
            background: linear-gradient(135deg, var(--accent-purple), #5200cc);
            color: white;
            border: none;
            padding: 14px 28px;
            font-size: 1.05rem;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s ease;
            box-shadow: 0 5px 20px rgba(138, 43, 226, 0.4);
            margin-top: 10px;
            outline: none;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 7px 25px rgba(0, 255, 255, 0.4);
            background: linear-gradient(135deg, #5200cc, var(--accent-purple));
        }

        .btn-secondary {
            background: transparent;
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            box-shadow: none;
        }

        .btn-secondary:hover {
            background: rgba(0, 255, 255, 0.08);
            color: white;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.25);
        }

        .btn-danger {
            background: linear-gradient(135deg, var(--danger), #b3003b);
            box-shadow: 0 5px 20px rgba(255, 0, 85, 0.4);
        }
        .btn-danger:hover {
            background: linear-gradient(135deg, #b3003b, var(--danger));
            box-shadow: 0 7px 25px rgba(255, 0, 85, 0.6);
        }

        .flex-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        /* حقول الإدخال */
        .input-box {
            width: 100%;
            padding: 14px;
            background: #0d0f17;
            border: 2px solid rgba(255,255,255,0.05);
            border-radius: 10px;
            color: white;
            font-size: 1.05rem;
            text-align: center;
            margin-bottom: 20px;
            outline: none;
            transition: all 0.3s ease;
        }

        .input-box:focus {
            border-color: var(--accent-cyan);
            box-shadow: 0 0 12px rgba(0, 255, 255, 0.2);
        }

        /* لوحة عرض كود الغرفة المخصصة للمشاركة */
        .room-code-panel {
            background: #0d0f17;
            padding: 18px;
            border-radius: 14px;
            font-size: 1.6rem;
            font-weight: bold;
            color: var(--accent-cyan);
            letter-spacing: 3px;
            border: 2px dashed var(--accent-purple);
            margin: 15px 0 25px;
            position: relative;
            cursor: pointer;
        }

        /* واجهة الروم داخل التطبيق */
        .status-badge {
            background: rgba(0, 255, 255, 0.07);
            padding: 10px;
            border-radius: 10px;
            font-size: 0.95rem;
            color: var(--accent-cyan);
            margin-bottom: 25px;
            border: 1px solid rgba(0, 255, 255, 0.15);
        }

        .voice-grid {
            display: flex;
            justify-content: center;
            gap: 25px;
            margin-bottom: 35px;
            flex-wrap: wrap;
        }

        .voice-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
            width: 90px;
        }

        .user-avatar-wrapper {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: 3px solid var(--text-muted);
            overflow: hidden;
            background: #1c1e29;
            position: relative;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .user-avatar-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* عندما يتحدث اللاعب: توهج نيون أخضر */
        .voice-card.speaking .user-avatar-wrapper {
            border-color: var(--accent-green);
            box-shadow: 0 0 25px var(--accent-green);
            transform: scale(1.08);
        }

        /* زر كتم الصوت الدائري الخاص بكل لاعب */
        .action-mute-btn {
            position: absolute;
            bottom: 25px;
            right: -2px;
            background: var(--danger);
            width: 26px;
            height: 26px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            border: 2px solid var(--card-bg);
            box-shadow: 0 3px 8px rgba(0,0,0,0.4);
            transition: all 0.2s ease;
            z-index: 5;
            color: white;
            font-weight: bold;
            font-size: 0.7rem;
        }

        /* نمط كتم الصوت المفعل */
        .voice-card.muted .action-mute-btn {
            background: #555866;
        }

        .voice-card.muted .user-avatar-wrapper {
            opacity: 0.4;
            border-color: #444;
            box-shadow: none;
            transform: scale(0.95);
        }

        .player-name {
            margin-top: 10px;
            font-size: 0.9rem;
            font-weight: 600;
            color: #fff;
            text-overflow: ellipsis;
            white-space: nowrap;
            overflow: hidden;
            width: 100%;
        }

        /* ======================================================= */
        /* محاكاة شاشة الألعاب والـ Overlay العائم */
        /* ======================================================= */
        .game-background-simulator {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: radial-gradient(circle at center, #2c1b4d 0%, #050508 100%);
            z-index: 9999;
        }

        .floating-overlay-widget {
            position: absolute;
            top: 40px;
            right: 40px;
            background: rgba(11, 12, 16, 0.9);
            border: 2px solid var(--accent-purple);
            border-radius: 16px;
            padding: 15px;
            box-shadow: 0 0 30px rgba(138, 43, 226, 0.3);
            width: 220px;
            text-align: center;
        }

        .floating-overlay-widget h4 {
            font-size: 0.9rem;
            color: var(--accent-cyan);
            margin-bottom: 10px;
        }

        .mini-grid {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .mini-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            border: 2px solid var(--text-muted);
            overflow: hidden;
        }

        .mini-avatar.speaking {
            border-color: var(--accent-green);
            box-shadow: 0 0 10px var(--accent-green);
        }

        .mini-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <div class="container" id="app-container">
        <!-- الشاشة 1: تسجيل الدخول وإنشاء/الانضمام للغرفة -->
        <div class="card screen active" id="screen-login">
            <h2>GamerVoice App</h2>
            <p class="subtitle">نظام الروم والمكالمات العائمة الاحترافي</p>
            
            <div class="avatar-uploader" onclick="document.getElementById('file-input').click()">
                <div class="avatar-ring" id="avatar-preview-box">
                    <span class="icon-placeholder" id="avatar-icon">👤</span>
                    <img id="avatar-img" src="" alt="Avatar">
                </div>
                <div class="upload-badge">+</div>
                <input type="file" id="file-input" style="display: none;" accept="image/*" onchange="previewAvatar(event)">
            </div>

            <input type="text" class="input-box" id="username-input" placeholder="أدخل اسم اللاعب الخاص بك" value="Player_One">
            <input type="text" class="input-box" id="join-code-input" placeholder="أدخل كود الغرفة (في حال الانضمام)">
            
            <div class="flex-buttons">
                <button class="btn" onclick="createNewRoom()">إنشاء غرفة جديدة</button>
                <button class="btn btn-secondary" onclick="joinRoom()">الانضمام برقم الغرفة</button>
            </div>
        </div>

        <!-- الشاشة 2: داخل الغرفة (صوتية النشاط) -->
        <div class="card screen" id="screen-room">
            <h2>لوحة تحكم الغرفة</h2>
            <div class="room-code-panel" id="display-room-code" onclick="copyRoomCode()">------</div>
            <p class="subtitle" style="margin-bottom: 15px;">اضغط على الكود أعلاه لنسخه ومشاركته</p>
            
            <div class="status-badge" id="room-status">متصل حالياً بالروم الصوتية...</div>

            <!-- شبكة اللاعبين داخل الروم -->
            <div class="voice-grid" id="players-list">
                <!-- سيتم توليد اللاعبين ديناميكياً بواسطة الجافاسكريبت هنا -->
            </div>

            <div class="flex-buttons">
                <button class="btn btn-secondary" onclick="toggleOverlayMode(true)">تفعيل الوضع العائم فوق الألعاب</button>
                <button class="btn btn-danger" onclick="leaveRoom()">مغادرة الغرفة وإنهاء الاتصال</button>
            </div>
        </div>
    </div>

    <!-- واجهة محاكاة الوضع العائم (تظهر كطبقة علوية فوق الشاشة بالكامل) -->
    <div class="game-background-simulator" id="game-simulator">
        <div class="floating-overlay-widget">
            <h4>GamerVoice - مصغر</h4>
            <div class="mini-grid" id="mini-players-list">
                <!-- واجهة اللاعبين المصغرة -->
            </div>
            <button class="btn btn-danger" style="padding: 6px; font-size: 0.8rem;" onclick="toggleOverlayMode(false)">العودة للتطبيق</button>
        </div>
    </div>

    <!-- ======================================================= -->
    /* نظام البرمجة والتفاعل التلقائي (JavaScript) */
    <!-- ======================================================= -->
    <script>
        // المتغيرات العامة لحفظ حالة التطبيق الحالية
        let currentUser = {
            name: "Player_One",
            avatar: ""
        };
        let currentRoomCode = "";
        let isMuted = false;

        // مصفوفة وهمية لمحاكاة وجود لاعبين آخرين معك في الروم للتجربة تفاعلياً
        const mockPlayers = [
            { name: "GAARA_🔥", avatar: "https://images.unsplash.com/photo-1566492031773-4f4e44671857?auto=format&fit=crop&w=100&q=80", speaking: true, muted: false },
            { name: "Nova_King", avatar: "https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?auto=format&fit=crop&w=100&q=80", speaking: false, muted: true }
        ];

        // 1. وظيفة معاينة الصورة المرفوعة
        function previewAvatar(event) {
            const reader = new FileReader();
            reader.onload = function() {
                const imgElement = document.getElementById('avatar-img');
                const iconElement = document.getElementById('avatar-icon');
                imgElement.src = reader.result;
                imgElement.style.display = 'block';
                iconElement.style.display = 'none';
                currentUser.avatar = reader.result; // حفظ الصورة
            }
            if(event.target.files[0]) {
                reader.readAsDataURL(event.target.files[0]);
            }
        }

        // 2. وظيفة إنشاء كود غرفة عشوائي والتحول للشاشة الثانية
        function createNewRoom() {
            const nameInput = document.getElementById('username-input').value.trim();
            if(!nameInput) {
                alert("برجاء إدخال اسمك أولاً!");
                return;
            }
            currentUser.name = nameInput;

            // توليد كود عشوائي مكون من 6 أرقام
            currentRoomCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            launchRoomView();
        }

        // 3. وظيفة الانضمام بكود مكتوب
        function joinRoom() {
            const nameInput = document.getElementById('username-input').value.trim();
            const codeInput = document.getElementById('join-code-input').value.trim();
            
            if(!nameInput) { alert("برجاء إدخال اسمك أولاً!"); return; }
            if(!codeInput) { alert("برجاء إدخال كود الغرفة المراد الانضمام إليها!"); return; }
            
            currentUser.name = nameInput;
            currentRoomCode = codeInput;
            
            launchRoomView();
        }

        // 4. بناء واجهة الروم وعرض اللاعبين
        function launchRoomView() {
            document.getElementById('display-room-code').innerText = currentRoomCode;
            
            // إخفاء شاشة تسجيل الدخول وإظهار شاشة الروم
            document.getElementById('screen-login').classList.remove('active');
            document.getElementById('screen-room').classList.add('active');
            
            renderPlayers();
            // بدء محاكاة حركة الصوت التلقائية لجعل الواجهة تبدو حية
            startVoiceSimulation();
        }

        // 5. طباعة اللاعبين في الصفحة
        function renderPlayers() {
            const grid = document.getElementById('players-list');
            grid.innerHTML = ""; // تفريغ الشبكة أولاً

            // إضافة المستخدم الحالي (أنت)
            const userImg = currentUser.avatar ? currentUser.avatar : 'https://via.placeholder.com/100/1d2133/ffffff?text=YOU';
            grid.innerHTML += `
                <div class="voice-card ${isMuted ? 'muted' : ''}" id="my-voice-card">
                    <div class="user-avatar-wrapper">
                        <img src="${userImg}">
                    </div>
                    <div class="action-mute-btn" onclick="toggleMyMute()">🎤</div>
                    <div class="player-name">${currentUser.name} (أنت)</div>
                </div>
            `;

            // إضافة اللاعبين الوهميين الآخرين
            mockPlayers.forEach((p, index) => {
                grid.innerHTML += `
                    <div class="voice-card ${p.speaking ? 'speaking' : ''} ${p.muted ? 'muted' : ''}">
                        <div class="user-avatar-wrapper">
                            <img src="${p.avatar}">
                        </div>
                        <div class="action-mute-btn">${p.muted ? '❌' : '🔊'}</div>
                        <div class="player-name">${p.name}</div>
                    </div>
                `;
            });

            // تحديث الواجهة المصغرة أيضاً
            renderMiniOverlay();
        }

        // 6. التحكم بكتم المايك الخاص بك عند الضغط على الأيقونة الدائرية
        function toggleMyMute() {
            isMuted = !isMuted;
            const myCard = document.getElementById('my-voice-card');
            if(isMuted) {
                myCard.classList.add('muted');
                myCard.classList.remove('speaking');
            } else {
                myCard.classList.remove('muted');
            }
        }

        // 7. نسخ كود الروم للحافظة عند الضغط عليه
        function copyRoomCode() {
            navigator.clipboard.writeText(currentRoomCode);
            alert("تم نسخ كود الغرفة بنجاح: " + currentRoomCode);
        }

        // 8. محاكاة حركة التحدث النيون (تتغير كل ثانيتين بشكل عشوائي للتجربة الفنية)
        function startVoiceSimulation() {
            setInterval(() => {
                if(document.getElementById('screen-room').classList.contains('active')) {
                    mockPlayers.forEach(p => {
                        if(!p.muted) {
                            p.speaking = Math.random() > 0.5; // عشوائي يتحدث أو يصمت
                        }
                    });
                    renderPlayers();
                }
            }, 2000);
        }

        // 9. تشغيل وإلغاء الوضع العائم المصغر
        function toggleOverlayMode(show) {
            const simulator = document.getElementById('game-simulator');
            if(show) {
                simulator.style.display = 'block';
            } else {
                simulator.style.display = 'none';
            }
        }

        // 10. تحديث شاشة الألعاب المصغرة باللاعبين المتصلين
        function renderMiniOverlay() {
            const miniGrid = document.getElementById('mini-players-list');
            miniGrid.innerHTML = "";
            
            // إضافة صورتك مصغرة
            const userImg = currentUser.avatar ? currentUser.avatar : 'https://via.placeholder.com/100/1d2133/ffffff?text=U';
            miniGrid.innerHTML += `
                <div class="mini-avatar ${!isMuted ? 'speaking' : ''}">
                    <img src="${userImg}">
                </div>
            `;

            // إضافة الآخرين
            mockPlayers.forEach(p => {
                miniGrid.innerHTML += `
                    <div class="mini-avatar ${p.speaking ? 'speaking' : ''}">
                        <img src="${p.avatar}">
                    </div>
                `;
            });
        }

        // 11. مغادرة الغرفة والعودة للبداية
        function leaveRoom() {
            document.getElementById('screen-room').classList.remove('active');
            document.getElementById('screen-login').classList.add('active');
            currentRoomCode = "";
        }
    </script>
</body>
</html>
